{% if GAME_ID == 'wow' %}
<dl>
    <dt><label>{{ lang('ARMORY_URL') }}:</label></dt>
    <dd><a href="{{ ARMORY_URL }}">{{ ARMORY_URL }}</a></dd>
</dl>
<dl id="wow-sync-log" style="display:none;">
    <dt><label>{{ lang('WOW_SYNC_PROGRESS') }}:</label></dt>
    <dd>
        <ul id="wow-sync-phases" style="list-style:none;margin:0;padding:0;font-size:0.9em;"></ul>
    </dd>
</dl>
<script>
document.addEventListener('DOMContentLoaded', function() {
    var rosterUrl = '{{ U_ROSTER_SYNC }}';
    var specUrl = '{{ U_SPEC_SYNC }}';
    var portraitUrl = '{{ U_PORTRAIT_SYNC }}';
    var logRow = document.getElementById('wow-sync-log');
    var phases = document.getElementById('wow-sync-phases');
    var armoryBtn = document.querySelector('input[name="armory"]');
    var currentLi = null;

    function startPhase(name) {
        logRow.style.display = '';
        var li = document.createElement('li');
        li.style.padding = '2px 0';
        li.innerHTML = '<strong>' + name + ':</strong> <span class="phase-status">...</span>';
        phases.appendChild(li);
        currentLi = li;
    }

    function updatePhase(text) {
        if (currentLi) currentLi.querySelector('.phase-status').textContent = text;
    }

    function completePhase(text) {
        if (currentLi) currentLi.querySelector('.phase-status').textContent = text;
    }

    function runBatchPhase(name, url, next) {
        startPhase(name);
        fetchBatch(url, next);
    }

    function fetchBatch(url, next) {
        fetch(url).then(function(r) { return r.json(); }).then(function(data) {
            if (data.error) { completePhase(data.error); if (next) next(); return; }
            var done = data.remaining === 0 || data.done;
            var synced = data.total - (data.remaining || 0);
            updatePhase(synced + ' / ' + data.total);
            if (!done) {
                fetchBatch(url, next);
            } else {
                completePhase(synced + ' / ' + data.total + ' \u2713');
                if (next) next();
            }
        }).catch(function() {
            completePhase('Error');
            if (next) next();
        });
    }

    function syncAll() {
        phases.innerHTML = '';
        if (armoryBtn) armoryBtn.disabled = true;

        startPhase('{{ lang('WOW_PHASE_ROSTER') }}');
        updatePhase('...');

        fetch(rosterUrl).then(function(r) { return r.json(); }).then(function(data) {
            if (!data.success) {
                completePhase(data.message || 'Error');
                if (armoryBtn) armoryBtn.disabled = false;
                return;
            }
            completePhase(data.message + ' \u2713');

            runBatchPhase('{{ lang('WOW_PHASE_SPECS') }}', specUrl, function() {
                runBatchPhase('{{ lang('WOW_PHASE_PORTRAITS') }}', portraitUrl, function() {
                    if (armoryBtn) armoryBtn.disabled = false;
                });
            });
        }).catch(function(err) {
            completePhase('Error: ' + err.message);
            if (armoryBtn) armoryBtn.disabled = false;
        });
    }

    if (armoryBtn) {
        armoryBtn.addEventListener('click', function(e) {
            e.preventDefault();
            e.stopPropagation();
            syncAll();
        });
    }

    // Auto-sync missing specs and portraits on page load
    fetch(specUrl).then(function(r) { return r.json(); }).then(function(specData) {
        var needSpecs = !specData.done && specData.remaining > 0;
        fetch(portraitUrl).then(function(r) { return r.json(); }).then(function(portData) {
            var needPortraits = !portData.done && portData.remaining > 0;
            if (needSpecs) {
                runBatchPhase('{{ lang('WOW_PHASE_SPECS') }}', specUrl, function() {
                    if (needPortraits) {
                        runBatchPhase('{{ lang('WOW_PHASE_PORTRAITS') }}', portraitUrl, function() {});
                    }
                });
            } else if (needPortraits) {
                runBatchPhase('{{ lang('WOW_PHASE_PORTRAITS') }}', portraitUrl, function() {});
            }
        });
    });
});
</script>
{% endif %}
